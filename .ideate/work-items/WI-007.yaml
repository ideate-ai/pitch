notes: |
  # WI-007: Critical Fixes

  ## Objective
  Address the 3 critical findings and 2 significant findings from cycle 001 review
  that are quick, isolated fixes.

  ## Implementation Notes

  ### CTA on Closing Slide (Critical - MR1)
  Modify slide 38 (the final "Questions?" slide). Add:
  - A GitHub-style install/try instruction or URL placeholder
  - Keep it minimal — one line is enough. Example: "github.com/user/ideate" or
    "Available as a Claude Code plugin"
  - Do not add email or personal contact — keep it professional

  ### Offline Fallback (Critical - EC1)
  Add an onerror handler to the reveal.js core script tag. If it fails to load:
  - Inject a visible div with a message: "This presentation requires an internet
    connection to load dependencies. Please connect and refresh."
  - Style it to be visible against the dark background
  - This is a graceful degradation, not a full offline solution
  - Example: <script onerror="document.body.innerHTML='<div style=...>message</div>'" src="...">

  ### KaTeX on 3+ Slides (Critical - WI-004 criterion)
  Currently only slide 22 ("The Math") has KaTeX. Add inline math notation to:
  - PPR walkthrough slides: reference $\alpha$ and probability values like $\pi(v)$
  - Edge-type weighting slide: add $w_{ij}$ notation for weights
  - The "Personalized PageRank" slide: add $\alpha = 0.15$ inline

  ### Presenter Name/Date (Significant - MR2)
  Add to the title slide (slide 1):
  - Placeholder: "[Your Name]" or similar
  - Date: "2026" or "March 2026"
  - Style: text-small dim class, below the tagline

  ### Code Readability (New issue)
  Increase base code font size:
  - Change .reveal pre code font-size from 0.55em to 0.6em
  - Change .code-compact pre code from 0.45em to 0.5em
  - Verify code blocks are readable at presentation scale

