notes: |
  # WI-002: Act 1-2 — Problem Statement and Vision

  ## Objective
  Create the opening 8 slides that establish the problem (current AI tools are
  feature-level and agreeable) and introduce ideate's vision (full SDLC management
  with critical analysis).

  ## Implementation Notes

  ### Act 1 Slides (The Problem)

  **Slide 1: Title**
  - "ideate" in large type with custom styling
  - Tagline: something like "AI That Manages Projects, Not Just Tasks"
  - Subtitle: presenter name, date
  - Clean, minimal, dark background with subtle accent

  **Slide 2: The AI Coding Revolution**
  - What exists today: Copilot, Cursor, Aider, Claude Code
  - They're transformative for individual tasks
  - Fragment reveal: "Generate a function" ✓ "Fix a bug" ✓ "Refactor a file" ✓
  - Then: "Manage a project?" with a visual pause/question

  **Slide 3: Still Thinking Small**
  - Two-column: "What AI Does Today" vs "What Projects Need"
  - Left: implement features, answer questions, generate code
  - Right: plan architecture, enforce consistency, accumulate knowledge, critical review
  - The gap between columns IS the problem

  **Slide 4: The Yes-Machine Problem**
  - Show an example of an AI blindly agreeing with a bad idea
  - Example: user says "let's store passwords in plaintext for simplicity"
  - AI assistant: "Sure! Here's how to store passwords in plaintext..."
  - ideate: "This violates security constraints. Passwords must be hashed with bcrypt..."
  - Use code-style formatting to make this feel real

  **Slide 5: What's Missing**
  - Fragment list building to the answer:
    - "Structured feedback loops" → knowledge decays between sessions
    - "Critical analysis" → AI agrees with everything
    - "Project-level context" → each task starts from zero
    - "Knowledge accumulation" → decisions are forgotten
  - These build to: "We need an AI that manages the full SDLC"

  ### Act 2 Slides (The Vision)

  **Slide 6: Section Divider**
  - Gradient background (primary → secondary accent)
  - "What if AI could manage a project?"
  - Minimal text, maximum impact

  **Slide 7: Introducing ideate**
  - One-line elevator pitch
  - "A Claude Code plugin that plans, executes, reviews, and refines — managing
    the full software development lifecycle with the rigor of a senior engineer."
  - Key differentiators as fragment list:
    - Interrogates requirements instead of accepting them
    - Accumulates domain knowledge across cycles
    - Critically reviews its own output
    - Converges on quality through structured feedback

  **Slide 8: The Full SDLC Loop**
  - Circular/cycle diagram: Plan → Execute → Review → Refine → (back to Execute or Converge)
  - Use auto-animate to build the cycle step by step
  - Each node in the cycle has a one-line description
  - The brrr loop: "Run this autonomously until convergence"
  - This is the anchor visual — the audience should remember this diagram

