id: GP-01
type: guiding_principle
name: Technical Depth as Differentiator
status: active
description: |
  The presentation must showcase genuine engineering sophistication — PPR algorithms,
  knowledge graphs, convergence criteria — not marketing abstractions. The audience
  is engineers and technical leaders. Hand-waving loses them; rigor earns respect.
  Every technical claim on a slide must be backed by real implementation detail.
